services:
  db:
    image: pgvector/pgvector:pg16
    container_name: product-agent-db
    environment:
      POSTGRES_DB: product_agent
      POSTGRES_USER: product_agent
      POSTGRES_PASSWORD: product_agent_dev
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_agent -d product_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: product-agent-api
    environment:
      DATABASE_URL: postgresql+psycopg://product_agent:product_agent_dev@db:5432/product_agent
      EMBEDDING_PROVIDER: hashing
      OPENAI_API_KEY: ""
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ../uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

